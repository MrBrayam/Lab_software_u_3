# Configuración del servidor
server.port=8080

# Configuración de base de datos MySQL (con creación automática si no existe)
spring.datasource.url=jdbc:mysql://localhost:3307/practica_bd?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Configuración de Thymeleaf para evitar caché en desarrollo
spring.thymeleaf.cache=false
